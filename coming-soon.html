<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexstay — Bientôt disponible</title>
  <meta name="description" content="Nexstay arrive bientôt. Locations saisonnières haut de gamme en Tunisie." />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --terracotta: #D4714E;
      --terracotta-dark: #B5583A;
      --cream: #FAF8F5;
      --dark: #1E1E1E;
      --muted: #8A8179;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--cream);
      color: var(--dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 24px;
      position: relative;
      overflow: hidden;
    }

    /* Background decoration */
    body::before {
      content: '';
      position: fixed;
      top: -30%;
      right: -20%;
      width: 60vw;
      height: 60vw;
      background: radial-gradient(circle, rgba(212, 113, 78, 0.08) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -20%;
      left: -15%;
      width: 50vw;
      height: 50vw;
      background: radial-gradient(circle, rgba(212, 113, 78, 0.06) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 560px;
      width: 100%;
    }

    /* Logo */
    .logo {
      display: inline-grid;
      grid-template-columns: max-content;
      row-gap: 3px;
      margin-bottom: 56px;
      text-decoration: none;
    }
    .logo-text {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-weight: 700;
      line-height: 1;
      display: block;
      white-space: nowrap;
    }
    .logo-nex  { color: var(--dark); }
    .logo-stay { color: var(--terracotta); }
    .logo-sub {
      display: block;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #B8B0A6;
    }

    /* Divider */
    .divider {
      width: 48px;
      height: 2px;
      background: var(--terracotta);
      margin: 0 auto 48px;
      border-radius: 2px;
    }

    /* Heading */
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(40px, 8vw, 64px);
      font-weight: 300;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: var(--dark);
      margin-bottom: 20px;
    }
    h1 em {
      font-style: italic;
      color: var(--terracotta);
    }

    /* Subtitle */
    .subtitle {
      font-size: clamp(15px, 2vw, 17px);
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 48px;
      font-weight: 400;
    }

    /* Contact */
    .contact-line {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: var(--muted);
      background: rgba(212, 113, 78, 0.08);
      border: 1px solid rgba(212, 113, 78, 0.18);
      padding: 12px 22px;
      border-radius: 100px;
      text-decoration: none;
      transition: background 0.2s, color 0.2s;
    }
    .contact-line:hover {
      background: rgba(212, 113, 78, 0.14);
      color: var(--terracotta-dark);
    }
    .contact-line svg {
      flex-shrink: 0;
      opacity: 0.7;
    }

    /* Footer */
    footer {
      position: relative;
      z-index: 1;
      margin-top: 64px;
      font-size: 12px;
      color: #C0B9B0;
      letter-spacing: 0.03em;
    }

    @media (max-width: 480px) {
      .logo { margin-bottom: 40px; }
      .divider { margin-bottom: 36px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="logo" aria-label="Nexstay">
      <span class="logo-text">
        <span class="logo-nex">Nex</span><span class="logo-stay">stay</span>
      </span>
      <span class="logo-sub">Conciergerie</span>
    </a>

    <div class="divider"></div>

    <h1>Quelque chose<br>de <em>beau</em> arrive.</h1>

    <p class="subtitle">
      Notre site est en cours de finalisation.<br>
      Nous serons en ligne très bientôt.
    </p>

    <a href="mailto:contact@nexstay.tn" class="contact-line">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="4" width="20" height="16" rx="2"/>
        <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
      </svg>
      contact@nexstay.tn
    </a>
  </div>

  <footer>&copy; 2025 Nexstay &mdash; Tous droits réservés</footer>
</body>
</html>
